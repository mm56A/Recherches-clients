<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des recherches — Investir à Lorient</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --ink:#1B2430;
    --ink-soft:#3A4454;
    --paper:#F5F2EA;
    --paper-raised:#FBFAF6;
    --line:#D9D2C0;
    --accent:#A85C2E;
    --accent-soft:#E8D9C8;
    --sea:#3D6B63;
    --sea-soft:#DCE8E4;
    --muted:#75705F;
    --danger:#A33B2E;
    --radius:4px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em;}
  .display{font-family:'Fraunces',serif;}
  #app{min-height:100vh; display:flex; flex-direction:column;}

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line);
    background:var(--paper-raised);
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .mark{
    width:28px;height:28px;border:1.5px solid var(--ink); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:14px; font-weight:600;
    flex-shrink:0;
  }
  .brand h1{font-size:17px; margin:0; font-weight:600; letter-spacing:-0.01em;}
  .brand small{color:var(--muted); font-size:12px; display:block; margin-top:1px;}
  .who{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:12px;}
  .who b{color:var(--ink); font-weight:600;}
  .btn-ghost{
    background:none;border:1px solid var(--line); color:var(--ink-soft);
    padding:6px 12px; border-radius:var(--radius); font-size:12.5px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .btn-ghost:hover{border-color:var(--ink-soft);}

  main{flex:1; display:flex; flex-direction:column;}

  /* ---------- Login ---------- */
  .login-wrap{
    flex:1; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .dossier{
    width:100%; max-width:400px; background:var(--paper-raised);
    border:1px solid var(--line); border-radius:8px; padding:36px 32px 28px;
    position:relative; box-shadow:0 1px 3px rgba(27,36,48,0.06);
  }
  .dossier::before{
    content:''; position:absolute; top:-1px; left:28px; width:64px; height:10px;
    background:var(--ink); border-radius:0 0 3px 3px;
  }
  .dossier h2{font-family:'Fraunces',serif; font-size:23px; margin:6px 0 4px; font-weight:500;}
  .dossier p.lede{color:var(--muted); font-size:13.5px; margin:0 0 26px; line-height:1.5;}
  label{display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin:16px 0 6px; font-weight:600;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=number], input[type=password], select, textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:#fff; font-size:14.5px; font-family:'Inter',sans-serif; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}
  .btn-primary{
    width:100%; margin-top:24px; background:var(--ink); color:var(--paper);
    border:none; padding:12px; border-radius:var(--radius); font-size:14.5px; font-weight:600;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .btn-primary:hover{background:var(--ink-soft);}
  .btn-primary:disabled{opacity:0.4; cursor:not-allowed;}
  .admin-link{text-align:center; margin-top:18px;}
  .admin-link a{color:var(--muted); font-size:12px; cursor:pointer; text-decoration:underline;}
  .err{color:var(--danger); font-size:12.5px; margin-top:8px;}
  .agence-row{display:flex; gap:8px;}
  .agence-row select{flex:1;}

  /* ---------- Tabs ---------- */
  .tabs{display:flex; gap:2px; padding:0 28px; border-bottom:1px solid var(--line); background:var(--paper-raised);}
  .tab{
    padding:13px 16px; font-size:13.5px; font-weight:600; color:var(--muted);
    cursor:pointer; border-bottom:2px solid transparent; user-select:none;
  }
  .tab.active{color:var(--ink); border-bottom-color:var(--accent);}

  .content{padding:24px 28px 60px; max-width:1100px; width:100%; margin:0 auto;}
  .content-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; gap:16px; flex-wrap:wrap;}
  .content-head h2{font-family:'Fraunces',serif; font-weight:500; font-size:20px; margin:0;}
  .content-head p{color:var(--muted); font-size:13px; margin:4px 0 0;}
  .btn-add{
    background:var(--accent); color:#fff; border:none; padding:9px 16px;
    border-radius:var(--radius); font-size:13.5px; font-weight:600; cursor:pointer;
    white-space:nowrap;
  }
  .btn-add:hover{background:#8f4c24;}

  /* ---------- Cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;}
  .card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:6px;
    padding:16px 16px 14px; position:relative; padding-top:30px;
  }
  .card .tag{
    position:absolute; top:0; left:14px; transform:translateY(-50%);
    background:var(--ink); color:var(--paper); font-size:11px; padding:3px 8px;
    border-radius:3px; font-weight:600;
  }
  .card .zone{font-family:'Fraunces',serif; font-size:16.5px; font-weight:500; margin:0 0 2px; padding-right:60px;}
  .card .type{font-size:12.5px; color:var(--muted); margin-bottom:10px;}
  .card .budget{font-size:14px; font-weight:600; color:var(--accent); margin-bottom:8px;}
  .pill-projet{display:inline-block; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:2px 7px; border-radius:3px; background:var(--sea-soft); color:var(--sea); margin-bottom:8px;}
  .card .crit{font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-bottom:10px; white-space:pre-wrap;}
  .card .foot{display:flex; justify-content:space-between; align-items:center; border-top:1px dashed var(--line); padding-top:10px; margin-top:10px;}
  .statut{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 7px; border-radius:3px;}
  .statut.actif{background:var(--sea-soft); color:var(--sea);}
  .statut.pause{background:#EEE7D5; color:var(--muted);}
  .statut.pourvu{background:#E4E1D8; color:#9A9484; text-decoration:line-through;}
  .maj{font-size:11px; color:var(--muted);}
  .card .actions{display:flex; gap:8px; margin-top:10px;}
  .card .actions button{
    flex:1; font-size:11.5px; padding:6px; border-radius:3px; border:1px solid var(--line);
    background:#fff; cursor:pointer; color:var(--ink-soft);
  }
  .card .actions button.del{color:var(--danger); border-color:#E3C9C4;}
  .card .visib{font-size:10.5px; color:var(--muted); margin-top:8px; font-style:italic;}

  .empty{
    text-align:center; padding:60px 20px; color:var(--muted); font-size:14px;
    border:1px dashed var(--line); border-radius:8px;
  }
  .empty .display{font-size:18px; color:var(--ink); display:block; margin-bottom:6px;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(27,36,48,0.45); display:flex;
    align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal{
    background:var(--paper-raised); border-radius:8px; padding:28px; width:100%; max-width:460px;
    max-height:88vh; overflow-y:auto; border:1px solid var(--line);
  }
  .modal h3{font-family:'Fraunces',serif; font-weight:500; font-size:19px; margin:0 0 18px;}
  .modal-actions{display:flex; gap:10px; margin-top:22px;}
  .modal-actions .btn-primary{margin-top:0;}
  .btn-cancel{
    flex:1; background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:12px; font-size:14px; cursor:pointer; color:var(--ink-soft); font-family:'Inter',sans-serif;
  }
  .checks{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .checks label{
    display:flex; align-items:center; gap:6px; text-transform:none; letter-spacing:0;
    font-size:13px; font-weight:500; color:var(--ink-soft); margin:0;
    border:1px solid var(--line); padding:6px 10px; border-radius:16px; cursor:pointer;
  }
  .checks input{width:auto;}
  .checks label.on{background:var(--accent-soft); border-color:var(--accent);}

  /* ---------- Admin: agences ---------- */
  .agence-list{display:flex; flex-direction:column; gap:8px; max-width:420px;}
  .agence-item{display:flex; justify-content:space-between; align-items:center; background:var(--paper-raised); border:1px solid var(--line); padding:10px 14px; border-radius:5px;}
  .agence-item button{background:none;border:none;color:var(--danger); cursor:pointer; font-size:12px;}
  .add-agence-row{display:flex; gap:8px; margin-top:16px; max-width:420px;}
  .add-agence-row input{flex:1;}
  .add-agence-row button{background:var(--ink); color:#fff; border:none; padding:0 16px; border-radius:var(--radius); cursor:pointer; font-size:13px;}

  /* ---------- Admin: stats ---------- */
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; padding:9px 10px; border-bottom:2px solid var(--ink); font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted);}
  td{padding:10px; border-bottom:1px solid var(--line);}
  tr:hover td{background:var(--paper);}
  .stat-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; max-width:600px;}
  .stat-card{background:var(--paper-raised); border:1px solid var(--line); border-radius:6px; padding:14px;}
  .stat-card .num{font-family:'Fraunces',serif; font-size:28px; display:block;}
  .stat-card .lbl{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em;}

  .loading{text-align:center; padding:60px; color:var(--muted); font-size:13px;}
#storage-warning{
  display:none; background:var(--danger); color:#fff; font-size:13px; text-align:center;
  padding:9px 16px; font-weight:600;
}
</style>
</head>
<body>
<div id="storage-warning">La connexion à la base de données a échoué. Vérifiez la configuration Firebase (clés dans le fichier) et les règles de sécurité Firestore.</div>
<div id="app"><div class="loading">Ouverture du registre…</div></div>

<script>
(function(){

  // ---------------- Config Firebase ----------------
  // ⚠️ Remplace ces valeurs par celles de TON projet Firebase
  // (Console Firebase > Paramètres du projet > Tes applications > SDK config)
  var firebaseConfig = {
    apiKey: "AIzaSyD4fYPytBWqyQwTojQHeBWQZN85Yg3fOhk",
    authDomain: "recherches-immo.firebaseapp.com",
    projectId: "recherches-immo",
    storageBucket: "recherches-immo.firebasestorage.app",
    messagingSenderId: "189218522680",
    appId: "1:189218522680:web:59442714e89e75137f08cd"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();
  var auth = firebase.auth();

  function ensureAuth(){
    return new Promise(function(resolve){
      var unsub = auth.onAuthStateChanged(function(user){
        if(user){ unsub(); resolve(user); }
        else{ auth.signInAnonymously().catch(function(e){ console.error('Auth échouée', e); warnStorageFail(); }); }
      });
    });
  }

  // ---------------- Constantes ----------------
  var STATUTS = ["actif","pause","pourvu"];
  var STATUT_LABEL = {actif:"Actif", pause:"En pause", pourvu:"Pourvu"};
  var PROJETS = ["RP","Invest","MDB","Autre"];
  var PROJET_LABEL = {RP:"Résidence principale", Invest:"Investissement locatif", MDB:"Marchand de biens", Autre:"Autre"};

  // ---------------- Etat ----------------
  var state = {
    booted:false,
    recherches:[],
    agences:[],
    visites:[],
    agentsManual:[],   // agents ajoutés manuellement par l'admin, pas encore connectés
    adminCode:"LORIENT56",
    user:null,       // {prenom, agence}
    isAdmin:false,
    tab:'partagees',
    adminTab:'recherches',
    modal:null        // {type:'add'|'edit'|'admin-edit'|'add-agent'|'edit-agent'|'confirm'|'rename-agence'|'params', data}
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }

  // ---------------- Stockage (Firestore) ----------------
  async function loadAll(){
    await ensureAuth();
    try{
      var rSnap = await db.collection('data').doc('recherches').get();
      state.recherches = rSnap.exists ? (rSnap.data().items || []) : [];
    }catch(e){ console.error('Erreur chargement recherches', e); state.recherches = []; }
    try{
      var aSnap = await db.collection('data').doc('agences').get();
      if(aSnap.exists){
        state.agences = aSnap.data().items || [];
      } else {
        state.agences = ["Jinvesty Immobilier","IAD"];
        await saveAgences();
      }
    }catch(e){ console.error('Erreur chargement agences', e); state.agences = ["Jinvesty Immobilier","IAD"]; }
    try{
      var vSnap = await db.collection('data').doc('visites').get();
      state.visites = vSnap.exists ? (vSnap.data().items || []) : [];
    }catch(e){ console.error('Erreur chargement visites', e); state.visites = []; }
    try{
      var agSnap = await db.collection('data').doc('agentsManual').get();
      state.agentsManual = agSnap.exists ? (agSnap.data().items || []) : [];
    }catch(e){ console.error('Erreur chargement agents', e); state.agentsManual = []; }
    try{
      var cfgSnap = await db.collection('data').doc('config').get();
      state.adminCode = cfgSnap.exists && cfgSnap.data().adminCode ? cfgSnap.data().adminCode : "LORIENT56";
    }catch(e){ console.error('Erreur chargement config', e); state.adminCode = "LORIENT56"; }
    state.booted = true;
  }
  function warnStorageFail(){
    var el = document.getElementById('storage-warning');
    if(el) el.style.display = 'block';
  }
  async function saveRecherches(){
    try{ await db.collection('data').doc('recherches').set({items: state.recherches}); }
    catch(e){ console.error('Erreur sauvegarde recherches', e); warnStorageFail(); }
  }
  async function saveAgences(){
    try{ await db.collection('data').doc('agences').set({items: state.agences}); }
    catch(e){ console.error('Erreur sauvegarde agences', e); warnStorageFail(); }
  }
  async function saveVisites(){
    try{ await db.collection('data').doc('visites').set({items: state.visites}); }
    catch(e){ console.error('Erreur sauvegarde visites', e); warnStorageFail(); }
  }
  async function saveAgentsManual(){
    try{ await db.collection('data').doc('agentsManual').set({items: state.agentsManual}); }
    catch(e){ console.error('Erreur sauvegarde agents', e); warnStorageFail(); }
  }
  async function saveConfig(){
    try{ await db.collection('data').doc('config').set({adminCode: state.adminCode}); }
    catch(e){ console.error('Erreur sauvegarde config', e); warnStorageFail(); }
  }

  // ---------------- Helpers données ----------------
  function visibleForAgent(r, agence){
    if(r.origine === 'admin'){
      return r.visibleToAll || (r.visibleTo||[]).indexOf(agence) !== -1;
    }
    // recherche postée par un agent : visible pour l'auteur (géré ailleurs) + agences ajoutées manuellement
    return r.visibleToAll || (r.visibleTo||[]).indexOf(agence) !== -1;
  }
  function isMine(r){
    return r.origine==='agent' && r.auteurPrenom===state.user.prenom && r.auteurAgence===state.user.agence;
  }
  function getAdhocAgences(){
    var set = {};
    state.visites.forEach(function(v){ if(state.agences.indexOf(v.agence)===-1) set[v.agence]=true; });
    state.recherches.forEach(function(r){ if(r.auteurAgence && state.agences.indexOf(r.auteurAgence)===-1) set[r.auteurAgence]=true; });
    return Object.keys(set).sort();
  }
  function getAllKnownAgences(){
    return state.agences.concat(getAdhocAgences());
  }
  async function doRenameAgence(oldName, newName){
    newName = newName.trim();
    if(!newName || newName===oldName) return;
    state.agences = state.agences.filter(function(a){return a!==oldName;});
    if(state.agences.indexOf(newName)===-1) state.agences.push(newName);
    state.recherches.forEach(function(r){
      if(r.auteurAgence===oldName) r.auteurAgence = newName;
      if(r.visibleTo && r.visibleTo.indexOf(oldName)!==-1){
        r.visibleTo = r.visibleTo.filter(function(a){return a!==oldName;});
        if(r.visibleTo.indexOf(newName)===-1) r.visibleTo.push(newName);
      }
    });
    state.visites.forEach(function(v){ if(v.agence===oldName) v.agence = newName; });
    if(state.user && state.user.agence===oldName) state.user.agence = newName;
    await saveAgences();
    await saveRecherches();
    await saveVisites();
  }
  function getMergedAgents(){
    var map = {};
    function key(p,a){ return p+'|||'+a; }
    state.visites.forEach(function(v){
      var k = key(v.prenom, v.agence);
      if(!map[k]) map[k] = {prenom:v.prenom, agence:v.agence, nbVisites:0, derniereVisite:0, nbRecherches:0, source:'connexion'};
      map[k].nbVisites++;
      if(v.ts > map[k].derniereVisite) map[k].derniereVisite = v.ts;
    });
    state.recherches.forEach(function(r){
      if(r.origine!=='agent' || !r.auteurPrenom) return;
      var k = key(r.auteurPrenom, r.auteurAgence);
      if(!map[k]) map[k] = {prenom:r.auteurPrenom, agence:r.auteurAgence, nbVisites:0, derniereVisite:0, nbRecherches:0, source:'recherche'};
      map[k].nbRecherches++;
    });
    state.agentsManual.forEach(function(a){
      var k = key(a.prenom, a.agence);
      if(!map[k]) map[k] = {prenom:a.prenom, agence:a.agence, nbVisites:0, derniereVisite:0, nbRecherches:0, source:'manuel'};
      map[k].manuel = true;
    });
    return Object.values(map).sort(function(a,b){ return (b.derniereVisite||0) - (a.derniereVisite||0); });
  }
  async function doRenameAgent(oldPrenom, oldAgence, newPrenom, newAgence){
    newPrenom = (newPrenom||'').trim();
    newAgence = (newAgence||'').trim();
    if(!newPrenom || !newAgence) return;
    state.visites.forEach(function(v){
      if(v.prenom===oldPrenom && v.agence===oldAgence){ v.prenom = newPrenom; v.agence = newAgence; }
    });
    state.recherches.forEach(function(r){
      if(r.origine==='agent' && r.auteurPrenom===oldPrenom && r.auteurAgence===oldAgence){
        r.auteurPrenom = newPrenom; r.auteurAgence = newAgence;
      }
    });
    state.agentsManual.forEach(function(a){
      if(a.prenom===oldPrenom && a.agence===oldAgence){ a.prenom = newPrenom; a.agence = newAgence; }
    });
    if(newAgence && state.agences.indexOf(newAgence)===-1) state.agences.push(newAgence);
    await saveVisites();
    await saveRecherches();
    await saveAgentsManual();
    await saveAgences();
  }
  async function doDeleteAgent(prenom, agence){
    state.visites = state.visites.filter(function(v){ return !(v.prenom===prenom && v.agence===agence); });
    state.agentsManual = state.agentsManual.filter(function(a){ return !(a.prenom===prenom && a.agence===agence); });
    await saveVisites();
    await saveAgentsManual();
  }
  function nextRef(){
    var year = new Date().getFullYear();
    var n = state.recherches.filter(function(r){return r.reference && r.reference.indexOf('R-'+year)===0;}).length + 1;
    return 'R-'+year+'-'+String(n).padStart(3,'0');
  }
  function fmtDate(iso){
    if(!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function fmtBudget(n){
    if(!n && n!==0) return '';
    return Number(n).toLocaleString('fr-FR') + ' €';
  }

  // ---------------- Rendu racine ----------------
  function render(){
    var app = document.getElementById('app');
    if(!state.booted){ app.innerHTML = '<div class="loading">Ouverture du registre…</div>'; return; }
    if(!state.user && !state.isAdmin){
      app.innerHTML = renderLogin();
      attachLoginEvents();
      return;
    }
    app.innerHTML = renderShell();
    attachShellEvents();
    if(state.modal) renderModal();
  }

  // ---------------- Login ----------------
  function renderLogin(){
    var options = state.agences.map(function(a){return '<option value="'+esc(a)+'">'+esc(a)+'</option>';}).join('');
    return ''
    + '<div class="login-wrap"><div class="dossier">'
    + '  <h2>Registre des recherches</h2>'
    + '  <p class="lede">Investir à Lorient — accès agents partenaires. Indiquez votre prénom et votre agence pour consulter les recherches clients qui vous concernent.</p>'
    + '  <label>Prénom</label>'
    + '  <input type="text" id="in-prenom" placeholder="Votre prénom" autocomplete="off">'
    + '  <label>Agence</label>'
    + '  <div class="agence-row">'

  function attachLoginEvents(){
    var sel = document.getElementById('in-agence');
    var autreInput = document.getElementById('in-agence-autre');
    sel.addEventListener('change', function(){
      autreInput.style.display = sel.value === '__autre' ? 'block' : 'none';
    });
    document.getElementById('btn-login').addEventListener('click', async function(){
      var prenom = document.getElementById('in-prenom').value.trim();
      var agence = sel.value === '__autre' ? autreInput.value.trim() : sel.value;
      var err = document.getElementById('login-err');
      if(!prenom || !agence){
        err.textContent = 'Merci de renseigner votre prénom et votre agence.';
        err.style.display='block';
        return;
      }
      if(sel.value === '__autre' && state.agences.indexOf(agence)===-1){
        state.agences.push(agence);
        await saveAgences();
      }
      state.user = {prenom:prenom, agence:agence};
      state.visites.push({prenom:prenom, agence:agence, ts:Date.now()});
      await saveVisites();
      state.tab = 'partagees';
      render();
    });
    document.getElementById('lnk-admin').addEventListener('click', function(){
      var box = document.getElementById('admin-box');
      box.style.display = box.style.display==='none' ? 'block' : 'none';
    });
    document.getElementById('btn-admin-enter').addEventListener('click', function(){
      var code = document.getElementById('in-admincode').value;
      if(code === state.adminCode){
        state.isAdmin = true;
        state.adminTab = 'recherches';
        render();
      }else{
        var err = document.getElementById('admin-err');
        err.textContent = 'Code incorrect.';
        err.style.display='block';
      }
    });
  }

  // ---------------- Shell (topbar + tabs + content) ----------------
  function renderShell(){
    var headerRight = state.isAdmin
      ? '<div class="who"><b>Espace admin</b><button class="btn-ghost" id="btn-logout">Quitter</button></div>'
      : '<div class="who">'+esc(state.user.prenom)+' — <b>'+esc(state.user.agence)+'</b><button class="btn-ghost" id="btn-logout">Quitter</button></div>';

    var tabsHtml, contentHtml;
    if(state.isAdmin){
      tabsHtml = renderTabs([
        {key:'recherches', label:'Recherches'},
        {key:'agences', label:'Agences'},
        {key:'agents', label:'Agents'},
        {key:'stats', label:'Statistiques'},
        {key:'params', label:'Paramètres'}
      ], state.adminTab, true);
      if(state.adminTab==='recherches') contentHtml = renderAdminRecherches();
      else if(state.adminTab==='agences') contentHtml = renderAdminAgences();
      else if(state.adminTab==='agents') contentHtml = renderAdminAgents();
      else if(state.adminTab==='stats') contentHtml = renderAdminStats();
      else contentHtml = renderAdminParams();
    } else {
      tabsHtml = renderTabs([
        {key:'partagees', label:'Recherches partagées'},
        {key:'mesrecherches', label:'Mes recherches'}
      ], state.tab, false);
      contentHtml = state.tab==='partagees' ? renderAgentPartagees() : renderAgentMiennes();
    }

    return ''
    + '<div class="topbar"><div class="brand"><div class="mark">IL</div><div><h1>Registre des recherches</h1><small>Investir à Lorient</small></div></div>'+headerRight+'</div>'
    + tabsHtml
    + '<div class="content">'+contentHtml+'</div>';
  }
  function renderTabs(items, active, isAdmin){
    return '<div class="tabs">' + items.map(function(it){
      return '<div class="tab '+(it.key===active?'active':'')+'" data-tab="'+it.key+'" data-admin="'+(isAdmin?'1':'0')+'">'+it.label+'</div>';
    }).join('') + '</div>';
  }

  // ---------------- Vue agent : recherches partagées ----------------
  function renderAgentPartagees(){
    var list = state.recherches.filter(function(r){
      if(isMine(r)) return false; // les siennes sont dans l'autre onglet
      return visibleForAgent(r, state.user.agence);
    }).sort(function(a,b){ return (b.dateMaj||'').localeCompare(a.dateMaj||''); });

    var head = '<div class="content-head"><div><h2>Recherches partagées avec '+esc(state.user.agence)+'</h2><p>Mises à jour en temps réel par Investir à Lorient et les autres agences partenaires.</p></div></div>';
    if(list.length===0){
      return head + '<div class="empty"><span class="display">Aucune recherche partagée pour le moment</span>Revenez un peu plus tard, ou contactez Investir à Lorient directement.</div>';
    }
    return head + '<div class="grid">' + list.map(renderCard).join('') + '</div>';

  // ---------------- Vue agent : mes recherches ----------------
  function renderAgentMiennes(){
    var list = state.recherches.filter(isMine).sort(function(a,b){ return (b.dateMaj||'').localeCompare(a.dateMaj||''); });
    var head = '<div class="content-head"><div><h2>Mes recherches clients</h2><p>Visibles par Investir à Lorient. Partagées avec d’autres agences uniquement si nous en décidons ensemble.</p></div>'
      + '<button class="btn-add" id="btn-add-recherche">+ Ajouter une recherche</button></div>';

      return head + '<div class="empty"><span class="display">Vous n’avez encore ajouté aucune recherche</span>Cliquez sur « Ajouter une recherche » pour transmettre un besoin client.</div>';

  function renderCard(r, editable){
    var visibNote = '';
    if(editable){
      var extra = (r.visibleTo||[]).length;
      visibNote = r.visibleToAll
        ? '<div class="visib">Visible par toutes les agences</div>'
        : (extra>0 ? '<div class="visib">Partagée avec '+extra+' agence(s) en plus d’Investir à Lorient</div>' : '<div class="visib">Visible uniquement par Investir à Lorient</div>');
    }
    return ''
    + '<div class="card">'
    + '  <div class="tag mono">'+esc(r.reference||'—')+'</div>'
    + '  <div class="zone">'+esc(r.zone||'Zone non précisée')+'</div>'
    + '  <div class="type">'+esc(r.typeBien||'')+'</div>'
    + (r.projet ? '<div class="pill-projet">'+esc(PROJET_LABEL[r.projet]||r.projet)+'</div>' : '')
    + (r.budgetMax ? '<div class="budget">≤ '+fmtBudget(r.budgetMax)+'</div>' : '')
    + (r.criteres ? '<div class="crit">'+esc(r.criteres)+'</div>' : '')
    + '  <div class="foot"><span class="statut '+r.statut+'">'+STATUT_LABEL[r.statut]+'</span><span class="maj">maj '+fmtDate(r.dateMaj)+'</span></div>'
    + visibNote
    + (editable ? '<div class="actions"><button data-edit="'+r.id+'">Modifier</button><button class="del" data-del="'+r.id+'">Supprimer</button></div>' : '')
    + '</div>';
  }

  // ---------------- Vue admin : stats ----------------
  function renderAdminStats(){
    var head = '<div class="content-head"><div><h2>Statistiques de consultation</h2><p>Basées sur les connexions déclarées (prénom + agence) — indicatif, pas une authentification forte.</p></div></div>';
    var totalVisites = state.visites.length;
    var uniques = {};
    state.visites.forEach(function(v){ uniques[v.prenom+'|'+v.agence]=true; });
    var nbUniques = Object.keys(uniques).length;
    var nbAgences = {};
    state.visites.forEach(function(v){ nbAgences[v.agence]=true; });

    var cards = '<div class="stat-cards">'
      + '<div class="stat-card"><span class="num display">'+totalVisites+'</span><span class="lbl">Visites totales</span></div>'
      + '<div class="stat-card"><span class="num display">'+nbUniques+'</span><span class="lbl">Agents distincts</span></div>'
      + '<div class="stat-card"><span class="num display">'+Object.keys(nbAgences).length+'</span><span class="lbl">Agences actives</span></div>'
      + '</div>';

    if(totalVisites===0){
      return head + cards + '<div class="empty"><span class="display">Aucune visite enregistrée</span>Les connexions des agents apparaîtront ici.</div>';
    }

    // Group by prenom+agence
    var groups = {};
    state.visites.forEach(function(v){
      var k = v.prenom+'|'+v.agence;
      if(!groups[k]) groups[k] = {prenom:v.prenom, agence:v.agence, count:0, last:0};
      groups[k].count++;
      if(v.ts > groups[k].last) groups[k].last = v.ts;
    });
    var rows = Object.values(groups).sort(function(a,b){ return b.last - a.last; }).map(function(g){
      return '<tr><td>'+esc(g.prenom)+'</td><td>'+esc(g.agence)+'</td><td class="mono">'+g.count+'</td><td>'+new Date(g.last).toLocaleString('fr-FR')+'</td></tr>';
    }).join('');

    return head + cards + '<table><thead><tr><th>Prénom</th><th>Agence</th><th>Visites</th><th>Dernière visite</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  // ---------------- Modal : ajout / édition recherche (agent) ----------------
  function renderModal(){
    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.id = 'overlay';

    if(state.modal.type==='confirm'){
      overlay.innerHTML = ''
      + '<div class="modal">'
      + '  <h3>Confirmer</h3>'
      + '  <p style="font-size:14px;color:var(--ink-soft);line-height:1.5;margin:0;">'+esc(state.modal.data.message)+'</p>'
      + '  <div class="modal-actions"><button class="btn-cancel" id="m-cancel">Annuler</button><button class="btn-primary" id="m-confirm" style="background:var(--danger);">Confirmer</button></div>'
      + '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e){ if(e.target===overlay) closeModal(); });
      document.getElementById('m-cancel').addEventListener('click', closeModal);

        var cb = state.modal.data.onConfirm;
        closeModal();
        if(cb) await cb();

      + '  <div id="agent-err" class="err" style="display:none;"></div>'

      + '</div>';
    } else if(state.modal.type==='admin-edit'){

        var on = (r2.visibleTo||[]).indexOf(a)!==-1;

      + '  <label>Zone</label><input type="text" id="m-zone" value="'+esc(r2.zone)+'">'
      + '  <label>Type de bien</label><input type="text" id="m-type" value="'+esc(r2.typeBien)+'">'
      + '  <label>Type de projet</label><select id="m-projet"><option value="">Non précisé</option>'+PROJETS.map(function(p){return '<option value="'+p+'" '+(r2.projet===p?'selected':'')+'>'+PROJET_LABEL[p]+'</option>';}).join('')+'</select>'
      + '  <label>Budget max (€)</label><input type="number" id="m-budget" value="'+esc(r2.budgetMax)+'">'
      + '  <label>Critères</label><textarea id="m-crit" rows="3">'+esc(r2.criteres)+'</textarea>'
      + '  <label>Statut</label><select id="m-statut">'+STATUTS.map(function(s){return '<option value="'+s+'" '+(r2.statut===s?'selected':'')+'>'+STATUT_LABEL[s]+'</option>';}).join('')+'</select>'
      + '  <label><input type="checkbox" id="m-all" style="width:auto;display:inline-block;margin-right:6px;" '+(r2.visibleToAll?'checked':'')+'> Visible par toutes les agences</label>'
      + '  <label style="margin-top:14px;">Ou partager avec certaines agences</label>'
      + '  <div class="checks" id="m-checks">'+checks+'</div>'
      + '  <div class="modal-actions"><button class="btn-cancel" id="m-cancel">Annuler</button><button class="btn-primary" id="m-save">Enregistrer</button></div>'
      + '</div>';
    }
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e){ if(e.target===overlay){ closeModal(); } });
    document.getElementById('m-cancel').addEventListener('click', closeModal);

    if(state.modal.type==='admin-edit'){
      overlay.querySelectorAll('#m-checks label').forEach(function(lbl){
        lbl.addEventListener('click', function(){
          setTimeout(function(){
            var input = lbl.querySelector('input');
            lbl.classList.toggle('on', input.checked);
          },0);
        });
      });
    }

    document.getElementById('m-save').addEventListener('click', async function(){
      if(state.modal.type==='add' || state.modal.type==='edit'){
        var data = {
          id: state.modal.data ? state.modal.data.id : uid(),
          reference: document.getElementById('m-ref').value.trim(),
          zone: document.getElementById('m-zone').value.trim(),
          typeBien: document.getElementById('m-type').value.trim(),
          projet: document.getElementById('m-projet').value,
          budgetMax: document.getElementById('m-budget').value ? Number(document.getElementById('m-budget').value) : null,
          criteres: document.getElementById('m-crit').value.trim(),
          statut: document.getElementById('m-statut').value,
          dateMaj: new Date().toISOString(),
          origine: state.isAdmin ? 'admin' : 'agent',
          visibleTo: state.modal.data ? state.modal.data.visibleTo || [] : [],
          visibleToAll: state.modal.data ? !!state.modal.data.visibleToAll : false
        };
        if(!state.isAdmin){
          data.auteurPrenom = state.user.prenom;
          data.auteurAgence = state.user.agence;
        } else if(state.modal.data && state.modal.data.origine==='agent'){
          data.origine = 'agent';
          data.auteurPrenom = state.modal.data.auteurPrenom;
          data.auteurAgence = state.modal.data.auteurAgence;
        }
        var idx = state.recherches.findIndex(function(x){return x.id===data.id;});
        if(idx>=0) state.recherches[idx] = data; else state.recherches.push(data);
        await saveRecherches();
      } else if(state.modal.type==='admin-edit'){
        var r3 = state.modal.data;
        r3.zone = document.getElementById('m-zone').value.trim();
        r3.typeBien = document.getElementById('m-type').value.trim();
        r3.projet = document.getElementById('m-projet').value;
        r3.budgetMax = document.getElementById('m-budget').value ? Number(document.getElementById('m-budget').value) : null;
        r3.criteres = document.getElementById('m-crit').value.trim();
        r3.statut = document.getElementById('m-statut').value;
        r3.visibleToAll = document.getElementById('m-all').checked;
        var checked = Array.from(overlay.querySelectorAll('#m-checks input:checked')).map(function(i){return i.value;});
        r3.visibleTo = checked;
        r3.dateMaj = new Date().toISOString();
        await saveRecherches();
      }
      closeModal();
      render();
    });
  }
  function closeModal(){
    state.modal = null;
    var ov = document.getElementById('overlay');
    if(ov) ov.remove();
  }

  // ---------------- Events shell ----------------
  function attachShellEvents(){
    document.getElementById('btn-logout').addEventListener('click', function(){
      state.user = null;
      state.isAdmin = false;
      render();
    });
    document.querySelectorAll('.tab').forEach(function(t){
      t.addEventListener('click', function(){
        if(t.dataset.admin==='1') state.adminTab = t.dataset.tab;
        else state.tab = t.dataset.tab;
        render();
      });
    });
    var addBtn = document.getElementById('btn-add-recherche');
    if(addBtn) addBtn.addEventListener('click', function(){
      state.modal = {type:'add', data:null};
      render();
    });
    document.querySelectorAll('[data-edit]').forEach(function(b){
      b.addEventListener('click', function(){
        var r = state.recherches.find(function(x){return x.id===b.dataset.edit;});
        state.modal = {type:'edit', data:r};
        render();
      });
    });
    document.querySelectorAll('[data-admin-edit]').forEach(function(b){
      b.addEventListener('click', function(){
        var r = state.recherches.find(function(x){return x.id===b.dataset.adminEdit;});
        state.modal = {type:'admin-edit', data:r};
        render();
      });
    });
    document.querySelectorAll('[data-del]').forEach(function(b){
      b.addEventListener('click', function(){
        var id = b.dataset.del;
        state.modal = {type:'confirm', data:{
          message:'Supprimer cette recherche ? Cette action est définitive.',
          onConfirm: async function(){
            state.recherches = state.recherches.filter(function(x){return x.id!==id;});
            await saveRecherches();
          }
        }};
        render();
      });
    });
    // admin agences
    var addAg = document.getElementById('btn-add-agence');
    if(addAg) addAg.addEventListener('click', async function(){
      var inp = document.getElementById('in-new-agence');
      var v = inp.value.trim();
      if(v && state.agences.indexOf(v)===-1){
        state.agences.push(v);
        await saveAgences();
        render();
      }
    });
    document.querySelectorAll('[data-promote-agence]').forEach(function(b){
      b.addEventListener('click', async function(){
        var name = b.dataset.promoteAgence;
        if(state.agences.indexOf(name)===-1){
          state.agences.push(name);
          await saveAgences();
          render();
        }
      });
    });
    document.querySelectorAll('[data-edit-agence]').forEach(function(b){
      b.addEventListener('click', function(){
        state.modal = {type:'rename-agence', data:{name:b.dataset.editAgence}};
        render();
      });
    });
    document.querySelectorAll('[data-rm-agence]').forEach(function(b){
      b.addEventListener('click', function(){
        var name = b.dataset.rmAgence;
        state.modal = {type:'confirm', data:{
          message:'Retirer "'+name+'" de la liste officielle des agences ? Les recherches déjà partagées avec elle resteront inchangées, mais elle disparaîtra du menu de connexion.',
          onConfirm: async function(){
            state.agences = state.agences.filter(function(a){return a!==name;});
            await saveAgences();
          }
        }};
        render();
      });
    });
    // admin agents
    var addAgent = document.getElementById('btn-add-agent');
    if(addAgent) addAgent.addEventListener('click', function(){
      state.modal = {type:'add-agent', data:null};
      render();
    });
    document.querySelectorAll('[data-edit-agent]').forEach(function(b){
      b.addEventListener('click', function(){
        var parts = b.dataset.editAgent.split('|||');
        state.modal = {type:'edit-agent', data:{prenom:parts[0], agence:parts[1]}};
        render();
      });
    });
    document.querySelectorAll('[data-del-agent]').forEach(function(b){
      b.addEventListener('click', function(){
        var parts = b.dataset.delAgent.split('|||');
        var prenom = parts[0], agence = parts[1];
        state.modal = {type:'confirm', data:{
          message:'Supprimer "'+prenom+'" ('+agence+') de la liste des agents ? Son historique de connexion sera effacé. Ses recherches déjà enregistrées resteront intactes et resteront gérables depuis l’onglet Recherches.',
          onConfirm: async function(){ await doDeleteAgent(prenom, agence); }
        }};
        render();
      });
    });
    // admin paramètres
    var saveCode = document.getElementById('btn-save-admincode');
    if(saveCode) saveCode.addEventListener('click', async function(){
      var val = document.getElementById('in-new-admincode').value.trim();
      var err = document.getElementById('params-err');
      var ok = document.getElementById('params-ok');
      err.style.display='none'; ok.style.display='none';
      if(val.length < 4){
        err.textContent = 'Le code doit faire au moins 4 caractères.';
        err.style.display='block';
        return;
      }
      state.adminCode = val;
      await saveConfig();
      ok.style.display='block';
      document.getElementById('in-new-admincode').value = '';
    });
  }

  function esc(s){
    if(s===null||s===undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadAll().then(render);
})();
</script>
</body>
</html>
